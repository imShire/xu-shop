  /admin/nav-icons/sort:
    patch:
      tags: [Admin内容]
      summary: 批量更新金刚区图标排序（需权限 nav_icon.edit）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [id, sort]
                properties:
                  id: { type: string }
                  sort: { type: integer }
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResp"

  /admin/nav-icons/{id}:
    put:
      tags: [Admin内容]
      summary: 更新金刚区图标（需权限 nav_icon.edit）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NavIconForm"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResp"
    delete:
      tags: [Admin内容]
      summary: 删除金刚区图标（需权限 nav_icon.edit）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResp"

  /admin/nav-icons/{id}/toggle:
    patch:
      tags: [Admin内容]
      summary: 切换金刚区图标启用状态（需权限 nav_icon.edit）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 切换成功，返回当前 is_active 值
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResp"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          is_active: { type: boolean }

  # ========== 首页装修（page_config）==========
  /c/page-config:
    get:
      tags: [C端页面装修]
      summary: 获取激活的页面装修配置（无需认证）
      parameters:
        - name: page_key
          in: query
          required: false
          schema: { type: string, default: home, maxLength: 32 }
      responses:
        "200":
          description: 激活的页面配置（无激活版本时返回空 modules）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResp"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageConfigResp"

  /admin/decorate/versions:
    get:
      tags: [Admin首页装修]
      summary: 获取首页装修历史版本列表（需权限 decorate.view）
      security:
        - BearerAuth: []
      parameters:
        - name: page_key
          in: query
          required: false
          schema: { type: string, default: home }
      responses:
        "200":
          description: 历史版本列表（最多 20 条，按版本降序）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResp"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PageConfigResp"

  /admin/decorate/save:
    post:
      tags: [Admin首页装修]
      summary: 保存新版本装修配置（不自动激活，需权限 decorate.edit）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavePageConfigReq"
      responses:
        "200":
          description: 新版本信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResp"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageConfigResp"

  /admin/decorate/activate/{id}:
    post:
      tags: [Admin首页装修]
      summary: 激活指定版本（需权限 decorate.edit）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: 版本 ID（字符串雪花 ID）
        - name: page_key
          in: query
          required: false
          schema: { type: string, default: home }
      responses:
        "200":
          description: 激活成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResp"

  # ========== 监控 ==========
  /metrics:
    get:
      tags: [开放接口]
      summary: Prometheus 指标端点
      responses:
        "200":
          description: Prometheus 格式指标文本
